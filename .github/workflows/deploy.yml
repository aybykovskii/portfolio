name: Build & Push Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  APP_NAME: portfolio
  STAGE: prod

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      TITLE: ${{ steps.title.outputs.TITLE }}

    steps:
      # 1) Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2) Устанавливаем QEMU и Docker Buildx (чтобы можно было билдить контейнеры)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3) Log in to Docker registry (настроить в Secrets GitHub)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4) Build & Push Docker image
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:latest
          build-args: |
            SITE_URL=${{ vars.SITE_URL }}

      - name: Prepare commit title
        run: |
          TITLE="$(git log -1 --pretty=%s | sed 's/\"/\\\"/g')"
      
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TITLE="$TITLE - manual"
          fi
      
          echo "TITLE=$TITLE" >> $GITHUB_ENV

      - name: Pass title to trigger jobs
        run: echo "TITLE=${{ env.TITLE }}" >> $GITHUB_OUTPUT
        id: title

  trigger-dokploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Trigger Dokploy redeploy
        run: |
          curl -X 'POST' \
            'https://${{ secrets.DOKPLOY_DOMAIN }}/api/application.deploy' \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -H 'x-api-key: ${{ secrets.DOKPLOY_API_KEY }}' \
            -d '{
              "applicationId": "${{ secrets.DOKPLOY_APPLICATION_ID }}",
              "title": "${{ needs.build.outputs.TITLE }}"
            }'